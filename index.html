<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Notion Logger Fix</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; background: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: #28a745; color: white; }
        .btn-send { background: #007bff; color: white; }
        #status { padding: 10px; background: #e9ecef; border-radius: 5px; font-size: 0.9rem; min-height: 20px; }
    </style>
</head>
<body>
    <h3>📅 スケジュール登録</h3>

    <div class="card">
        <label>対象月</label>
        <input type="month" id="monthPicker">
        
        <label>バイト日 (例: 1, 5, 12)</label>
        <input type="text" id="workDays" placeholder="半角数字とカンマで入力">
        
        <button class="btn btn-add" onclick="confirmDays()">1. 日程を確定する</button>
    </div>

    <div class="card">
        <label>就寝時間 (A:通常 / B:バイト前夜)</label>
        <div style="display:flex; gap:10px;">
            <input type="time" id="sleepA" value="23:30">
            <input type="time" id="sleepB" value="22:00">
        </div>
        <div id="status">ここに確定した日程が出ます</div>
    </div>

    <button class="btn btn-send" onclick="sendToNotion()">2. Notionへ送信</button>

    <script>
        // グローバル変数
        let selectedWorkDays = [];

        // ページ読み込み時に今月をセット
        window.onload = () => {
            const now = new Date();
            document.getElementById('monthPicker').value = now.toISOString().substring(0, 7);
        };

        function confirmDays() {
            const input = document.getElementById('workDays').value;
            if (!input) {
                alert("バイトの日付を入力してください");
                return;
            }
            
            // カンマやスペースで区切って数字の配列にする
            selectedWorkDays = input.split(/[,、\s]+/)
                                   .map(d => parseInt(d))
                                   .filter(d => !isNaN(d));

            document.getElementById('status').innerText = "確定: " + selectedWorkDays.join(", ") + "日";
            console.log("確定した日:", selectedWorkDays);
        }

        async function sendToNotion() {
            if (selectedWorkDays.length === 0) {
                alert("先に「1. 日程を確定する」を押してください");
                return;
            }

            const monthStr = document.getElementById('monthPicker').value;
            const [year, month] = monthStr.split('-').map(Number);
            const lastDay = new Date(year, month, 0).getDate();
            
            const sA = document.getElementById('sleepA').value;
            const sB = document.getElementById('sleepB').value;
            
            const payload = [];

            for (let day = 1; day <= lastDay; day++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // バイト当日 (06:00 - 09:00固定)
                if (selectedWorkDays.includes(day)) {
                    payload.push({
                        title: "セブン",
                        start_date: `${dateStr}T06:00:00`,
                        end_date: `${dateStr}T09:00:00`,
                        type: "Work"
                    });
                }

                // 就寝判定
                const isNextDayWork = selectedWorkDays.includes(day + 1);
                const sleepTime = isNextDayWork ? sB : sA;
                payload.push({
                    title: isNextDayWork ? "就寝(B)" : "就寝(A)",
                    start_date: `${dateStr}T${sleepTime}:00`,
                    end_date: `${dateStr}T23:59:59`,
                    type: "Sleep"
                });
            }

            console.log("送信データ:", payload);

            try {
                const response = await fetch("https://hook.eu1.make.com/dbm7geabnuzxoutgoz7h3v2cuyzhklct", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: payload })
                });

                if (response.ok) {
                    alert("送信に成功しました！");
                } else {
                    alert("送信失敗。MakeのWebhookを確認してください。");
                }
            } catch (err) {
                console.error(err);
                alert("ネットワークエラーが発生しました。");
            }
        }
    </script>
</body>
</html>
