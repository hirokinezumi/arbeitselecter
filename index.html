<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Notion Dual DB Logger - Stable</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { color: #007bff; margin-top: 0; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin: 10px 0 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; color: white; }
        .btn-send { background: #007bff; color: white; margin-top: 15px; }
        #status { margin-top: 15px; padding: 15px; background: #eee; border-radius: 6px; font-size: 0.85rem; min-height: 50px; line-height: 1.6; }
    </style>
</head>
<body>
    <h3>📅 振分登録 (安定版)</h3>

    <div class="card">
        <label>対象月</label>
        <input type="month" id="monthPicker">
        
        <label>バイト日 (1, 3, 5...)</label>
        <input type="text" id="workDays" placeholder="数字をカンマで入力">
        
        <button class="btn btn-add" onclick="confirmDays()" style="margin-top:10px;">1. 日程を確定</button>
    </div>

    <div class="card">
        <label>就寝設定</label>
        <div style="display:flex; gap:10px;">
            <input type="time" id="sleepA" value="23:00">
            <input type="time" id="sleepB" value="22:00">
        </div>
        <div id="status">まず日程を確定してください</div>
    </div>

    <button class="btn btn-send" onclick="sendToNotion()">2. Notionへ一括送信</button>

    <script>
        let selectedWorkDays = [];

        window.onload = () => {
            const now = new Date();
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            document.getElementById('monthPicker').value = nextMonth.toISOString().substring(0, 7);
        };

        function confirmDays() {
            const input = document.getElementById('workDays').value;
            if (!input) return alert("日付を入力してください");
            selectedWorkDays = input.split(/[,、\s]+/).map(d => parseInt(d)).filter(d => !isNaN(d)).sort((a,b) => a-b);
            document.getElementById('status').innerHTML = "<b>確定:</b> " + selectedWorkDays.join(", ") + "日<br>準備ができました。送信ボタンを押してください。";
        }

        async function sendToNotion() {
            if (selectedWorkDays.length === 0) return alert("先に日程を確定してください");
            
            const monthStr = document.getElementById('monthPicker').value;
            const [year, month] = monthStr.split('-').map(Number);
            const lastDay = new Date(year, month, 0).getDate(); // その月の末日まで取得
            
            const sA = document.getElementById('sleepA').value;
            const sB = document.getElementById('sleepB').value;

            const btn = document.querySelector('.btn-send');
            btn.disabled = true;
            btn.innerText = "処理中...";

            for (let day = 1; day <= lastDay; day++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // --- 1. 就寝予定 ---
                const isNextDayWork = selectedWorkDays.includes(day + 1);
                const sleepTime = isNextDayWork ? sB : sA;
                const sleependTime = addMinutesToTime(sleepTime, 45);

                console.log(`${day}日目: 就寝データを送信`);
                await postData({
                    db_type: "sleep",
                    title: isNextDayWork ? "就寝(B)" : "就寝(A)",
                    start_date: `${dateStr}T${sleepTime}:00`,
                    end_date: `${dateStr}T${sleependTime}:00`
                });

                // --- 2. バイト予定 ---
                if (selectedWorkDays.includes(day)) {
                    console.log(`${day}日目: バイトデータを送信`);
                    await postData({
                        db_type: "work",
                        title: "セブンバイト",
                        start_date: `${dateStr}T06:00:00`,
                        end_date: `${dateStr}T09:00:00`
                    });
                }

                // 画面表示を更新
                document.getElementById('status').innerText = `${day} / ${lastDay} 日目を完了...`;
                
                // 重要：Make側の負荷分散のために少し長めに待機 (0.5秒)
                await new Promise(r => setTimeout(r, 500));
            }

            alert("すべてのデータの送信が完了しました！");
            document.getElementById('status').innerText = "完了しました。Notionを確認してください。";
            btn.disabled = false;
            btn.innerText = "2. Notionへ一括送信";
        }

        function addMinutesToTime(timeStr, addMinutes) {
            let [hours, minutes] = timeStr.split(':').map(Number);
            minutes += addMinutes;
            hours += Math.floor(minutes / 60);
            minutes = minutes % 60;
            hours = hours % 24;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
        }

        async function postData(payload) {
            try {
                const response = await fetch("https://hook.eu1.make.com/dbm7geabnuzxoutgoz7h3v2cuyzhklct", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error('Network response was not ok');
            } catch (e) { 
                console.error("送信失敗:", e); 
            }
        }
    </script>
</body>
</html>
