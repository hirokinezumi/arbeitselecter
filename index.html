<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Notion Logger - Date Shift Mode</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { color: #007bff; margin-top: 0; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin: 10px 0 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; color: white; }
        .btn-send { background: #007bff; color: white; margin-top: 15px; }
        #status { margin-top: 15px; padding: 15px; background: #eee; border-radius: 6px; font-size: 0.85rem; min-height: 50px; line-height: 1.6; }
    </style>
</head>
<body>
    <h3>📅 就寝日スライド登録</h3>

    <div class="card">
        <label>対象月（この月のカレンダーを埋めます）</label>
        <input type="month" id="monthPicker">
        
        <label>バイト日 (1, 3, 5...)</label>
        <input type="text" id="workDays" placeholder="数字をカンマで入力">
        
        <button class="btn btn-add" onclick="confirmDays()" style="margin-top:10px;">1. 日程を確定</button>
    </div>

    <div class="card">
        <label>就寝設定</label>
        <div style="display:flex; gap:10px;">
            <input type="time" id="sleepA" value="23:30">
            <input type="time" id="sleepB" value="22:00">
        </div>
        <div id="status">日程を確定してください</div>
    </div>

    <button class="btn btn-send" onclick="sendToNotion()">2. Notionへ送信</button>

    <script>
        let selectedWorkDays = [];

        window.onload = () => {
            const now = new Date();
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            document.getElementById('monthPicker').value = nextMonth.toISOString().substring(0, 7);
        };

        function confirmDays() {
            const input = document.getElementById('workDays').value;
            if (!input) return alert("日付を入力してください");
            selectedWorkDays = input.split(/[,、\s]+/).map(d => parseInt(d)).filter(d => !isNaN(d)).sort((a,b) => a-b);
            document.getElementById('status').innerHTML = "<b>確定:</b> " + selectedWorkDays.join(", ") + "日<br>就寝データは前月末〜今月末1日前で作成されます。";
        }

        async function sendToNotion() {
            if (selectedWorkDays.length === 0) return alert("先に日程を確定してください");
            
            const monthStr = document.getElementById('monthPicker').value;
            const [year, month] = monthStr.split('-').map(Number);
            
            // --- 日付の計算 ---
            // 今月の初日
            const firstDayOfThisMonth = new Date(year, month - 1, 1);
            // 前月の最終日
            const lastDayOfPrevMonth = new Date(year, month - 1, 0);
            // 今月の最終日
            const lastDayOfThisMonth = new Date(year, month, 0);
            
            const sA = document.getElementById('sleepA').value;
            const sB = document.getElementById('sleepB').value;

            const btn = document.querySelector('.btn-send');
            btn.disabled = true;
            btn.innerText = "送信中...";

            // --- 処理のメインループ ---
            // 開始：前月の最終日
            // 終了：今月の最終日の一日前 ( <= lastDay - 1 )
            const totalDays = lastDayOfThisMonth.getDate();
            
            // ログ用
            console.log("前月末:", lastDayOfPrevMonth.toDateString());
            console.log("今月末日前:", (totalDays - 1) + "日");

            for (let dayOffset = 0; dayOffset < totalDays; dayOffset++) {
                // dayOffset=0 のときは前月の最終日、1のときは今月1日...
                let targetDate = new Date(year, month - 1, dayOffset);
                
                // ループの初回（dayOffset=0）は前月の最終日に設定し直す
                if(dayOffset === 0) {
                    targetDate = lastDayOfPrevMonth;
                }

                const dateStr = formatDate(targetDate);
                const currentDayNum = targetDate.getDate();
                const isNextMonth = targetDate.getMonth() + 1 !== month;

                // 明日がバイトか判定 (targetDateの翌日が selectedWorkDays に含まれるか)
                const tomorrow = new Date(targetDate);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const isTomorrowWork = (tomorrow.getMonth() + 1 === month) && selectedWorkDays.includes(tomorrow.getDate());

                // --- 1. 就寝予定の送信 ---
                const sleepTime = isTomorrowWork ? sB : sA;
                const sleependTime = addMinutesToTime(sleepTime, 45);

                await postData({
                    db_type: "sleep",
                    title: isTomorrowWork ? "就寝(B)" : "就寝(A)",
                    start_date: `${dateStr}T${sleepTime}:00`,
                    end_date: `${dateStr}T${sleependTime}:00`
                });

                // --- 2. バイト予定の送信（今月の範囲内かつバイト日の場合のみ） ---
                // バイトデータは「当日」の予定なので、targetDateが今月かつselectedWorkDaysにある場合
                if (!isNextMonth && selectedWorkDays.includes(currentDayNum)) {
                    await postData({
                        db_type: "work",
                        title: "セブンバイト",
                        start_date: `${dateStr}T06:00:00`,
                        end_date: `${dateStr}T09:00:00`
                    });
                }

                document.getElementById('status').innerText = `${dateStr} のデータを送信完了...`;
                await new Promise(r => setTimeout(r, 500));
            }

            alert("スライド登録が完了しました！");
            document.getElementById('status').innerText = "完了しました。";
            btn.disabled = false;
        }

        // YYYY-MM-DD 形式に変換
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function addMinutesToTime(timeStr, addMinutes) {
            let [hours, minutes] = timeStr.split(':').map(Number);
            minutes += addMinutes;
            hours += Math.floor(minutes / 60);
            minutes = minutes % 60;
            hours = hours % 24;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
        }

        async function postData(payload) {
            try {
                await fetch("https://hook.eu1.make.com/dbm7geabnuzxoutgoz7h3v2cuyzhklct", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
