<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Bulk Logger</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #007bff; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 18px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 2px rgba(0,123,255,0.1); }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.2s; margin-bottom: 10px; }
        .btn-add { background: #28a745; color: white; }
        .btn-add:hover { background: #218838; }
        .btn-send { background: #007bff; color: white; margin-top: 10px; }
        .btn-send:hover { background: #0069d9; }
        
        #status { padding: 15px; background: #e9ecef; border-radius: 8px; font-size: 0.9rem; min-height: 40px; border: 1px solid #dee2e6; color: #495057; line-height: 1.4; }
        .time-group { display: flex; gap: 15px; }
        .time-group div { flex: 1; }
    </style>
</head>
<body>
    <h3>📅 Notion一括登録</h3>

    <div class="card">
        <label>1. 対象の月を選択</label>
        <input type="month" id="monthPicker">
        
        <label>2. バイトの日付 (例: 1, 3, 15, 20)</label>
        <input type="text" id="workDays" placeholder="数字をカンマ(,)で区切って入力">
        
        <button class="btn btn-add" onclick="confirmDays()">日程を確定する</button>
    </div>

    <div class="card">
        <label>3. 就寝時間の指定</label>
        <div class="time-group">
            <div>
                <label>通常(A)</label>
                <input type="time" id="sleepA" value="23:30">
            </div>
            <div>
                <label>バイト前夜(B)</label>
                <input type="time" id="sleepB" value="22:00">
            </div>
        </div>
        <div id="status">ここに確定した内容が表示されます</div>
    </div>

    <button class="btn btn-send" onclick="sendToNotion()">Notionへ一括送信開始</button>

    <script>
        let selectedWorkDays = [];

        // 初期設定：翌月をデフォルトにする（予定登録のため）
        window.onload = () => {
            const now = new Date();
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            document.getElementById('monthPicker').value = nextMonth.toISOString().substring(0, 7);
        };

        // 日程確定処理
        function confirmDays() {
            const input = document.getElementById('workDays').value;
            if (!input) {
                alert("バイトの日付を入力してください");
                return;
            }
            
            selectedWorkDays = input.split(/[,、\s]+/)
                                   .map(d => parseInt(d))
                                   .filter(d => !isNaN(d))
                                   .sort((a, b) => a - b);

            document.getElementById('status').innerHTML = 
                `<strong>確定済み:</strong> ${selectedWorkDays.join(", ")}日<br>` +
                `<small>※前日の就寝は「B時間」になります</small>`;
        }

        // 送信メイン処理
        async function sendToNotion() {
            if (selectedWorkDays.length === 0) {
                alert("先に「日程を確定する」ボタンを押してください");
                return;
            }

            const confirmSend = confirm("1ヶ月分のデータを送信します。よろしいですか？");
            if (!confirmSend) return;

            const monthStr = document.getElementById('monthPicker').value;
            const [year, month] = monthStr.split('-').map(Number);
            const lastDay = new Date(year, month, 0).getDate();
            
            const sA = document.getElementById('sleepA').value;
            const sB = document.getElementById('sleepB').value;
            
            let successCount = 0;
            const btn = document.querySelector('.btn-send');
            btn.disabled = true;
            btn.innerText = "送信中...";

            for (let day = 1; day <= lastDay; day++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // --- 1. 就寝予定の送信 ---
                const isNextDayWork = selectedWorkDays.includes(day + 1);
                const sleepTime = isNextDayWork ? sB : sA;
                
                await postData({
                    title: isNextDayWork ? "就寝(B)" : "就寝(A)",
                    start_date: `${dateStr}T${sleepTime}:00`,
                    end_date: `${dateStr}T23:59:59`, // 終了は同日内
                    type: "Sleep"
                });
                successCount++;

                // --- 2. バイト予定の送信（当日がバイトなら） ---
                if (selectedWorkDays.includes(day)) {
                    await postData({
                        title: "セブン",
                        start_date: `${dateStr}T06:00:00`,
                        end_date: `${dateStr}T09:00:00`,
                        type: "Work"
                    });
                    successCount++;
                }
                
                document.getElementById('status').innerText = `${day}日目まで送信完了... (${successCount}件完了)`;
            }

            alert(`完了！ 合計 ${successCount} 件をNotionに登録しました。`);
            document.getElementById('status').innerText = "すべての送信が完了しました。";
            btn.disabled = false;
            btn.innerText = "Notionへ一括送信開始";
        }

        // Webhookへの個別POST関数
        async function postData(payload) {
            const webhookUrl = "https://hook.eu1.make.com/dbm7geabnuzxoutgoz7h3v2cuyzhklct";
            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                // 連続送信によるサーバー負荷軽減のため少しだけ待機(0.1秒)
                await new Promise(resolve => setTimeout(resolve, 100));
            } catch (err) {
                console.error("Post Error:", err);
            }
        }
    </script>
</body>
</html>
