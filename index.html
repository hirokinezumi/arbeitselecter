<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Notion Dual DB Logger (Custom Wakeup)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { color: #007bff; margin-top: 0; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin: 10px 0 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; color: white; }
        .btn-send { background: #007bff; color: white; margin-top: 15px; }
        #status { margin-top: 15px; padding: 10px; background: #eee; border-radius: 6px; font-size: 0.85rem; min-height: 40px; }
        .time-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .time-field { flex: 1; }
    </style>
</head>
<body>
    <h3>📅 2つのDBへ振分登録</h3>

    <div class="card">
        <label>対象月</label>
        <input type="month" id="monthPicker">
        
        <label>バイト日 (1, 3, 5...)</label>
        <input type="text" id="workDays" placeholder="数字とカンマで入力">
        
        <button class="btn btn-add" onclick="confirmDays()" style="margin-top:10px;">日程を確定</button>
    </div>

    <div class="card">
        <label>就寝時間の指定 (開始時刻)</label>
        <div class="time-row">
            <div class="time-field">
                <label>通常(A)</label>
                <input type="time" id="sleepA" value="23:00">
            </div>
            <div class="time-field">
                <label>バイト前夜(B)</label>
                <input type="time" id="sleepB" value="22:00">
            </div>
        </div>

        <label>起床時間の指定 (終了時刻)</label>
        <div class="time-row">
            <div class="time-field">
                <label>通常時</label>
                <input type="time" id="wakeNormal" value="23:45">
            </div>
            <div class="time-field">
                <label>バイト当日</label>
                <input type="time" id="wakeWork" value="22:45">
            </div>
        </div>
        <div id="status">日程を確定してください</div>
    </div>

    <button class="btn btn-send" onclick="sendToNotion()">Notionへ送信</button>

    <script>
        let selectedWorkDays = [];

        window.onload = () => {
            const now = new Date();
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            document.getElementById('monthPicker').value = nextMonth.toISOString().substring(0, 7);
        };

        function confirmDays() {
            const input = document.getElementById('workDays').value;
            if (!input) return alert("日付を入力してください");
            selectedWorkDays = input.split(/[,、\s]+/).map(d => parseInt(d)).filter(d => !isNaN(d)).sort((a,b) => a-b);
            document.getElementById('status').innerText = "確定済み: " + selectedWorkDays.join(", ") + "日";
        }

        async function sendToNotion() {
            if (selectedWorkDays.length === 0) return alert("日程を確定してください");
            
            const monthStr = document.getElementById('monthPicker').value;
            const [year, month] = monthStr.split('-').map(Number);
            const lastDay = new Date(year, month, 0).getDate();

            // 設定値の取得
            const sA = document.getElementById('sleepA').value;
            const sB = document.getElementById('sleepB').value;
            const wNormal = document.getElementById('wakeNormal').value;
            const wWork = document.getElementById('wakeWork').value;

            const btn = document.querySelector('.btn-send');
            btn.disabled = true;
            btn.innerText = "送信中...";

            for (let day = 1; day <= lastDay; day++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // --- 1. 就寝予定 ---
                // 開始時刻：明日がバイトならB時間、そうでなければA時間
                const isNextDayWork = selectedWorkDays.includes(day + 1);
                const sleepTime = isNextDayWork ? sB : sA;

                // 終了時刻：今日がバイトならバイト用、そうでなければ通常用
                const isTodayWork = selectedWorkDays.includes(day);
                const wakeTime = isTodayWork ? wNormal : wWork;

                await postData({
                    db_type: "sleep",
                    title: "就寝",
                    start_date: `${dateStr}T${sleepTime}:00`,
                    end_date: `${dateStr}T${wakeTime}:00` // ここを分岐
                });

                // --- 2. バイト予定 ---
                if (isTodayWork) {
                    await postData({
                        db_type: "work",
                        title: "セブン",
                        start_date: `${dateStr}T06:00:00`,
                        end_date: `${dateStr}T09:00:00`
                    });
                }
                document.getElementById('status').innerText = `${day}日目まで送信中...`;
            }

            alert("送信完了！");
            document.getElementById('status').innerText = "完了しました。";
            btn.disabled = false;
            btn.innerText = "Notionへ送信";
        }

        async function postData(payload) {
            try {
                await fetch("https://hook.eu1.make.com/dbm7geabnuzxoutgoz7h3v2cuyzhklct", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                await new Promise(r => setTimeout(r, 100)); 
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
