<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Notion Life Logger - Full Routine</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { color: #007bff; margin-top: 0; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin: 10px 0 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* 曜日ボタンのスタイル */
        .day-selector { display: flex; gap: 5px; justify-content: space-between; margin-bottom: 10px; }
        .day-btn { flex: 1; padding: 8px 0; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .day-btn.active { background: #007bff; color: white; border-color: #007bff; font-weight: bold; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; color: white; }
        .btn-send { background: #007bff; color: white; margin-top: 15px; }
        #status { margin-top: 15px; padding: 15px; background: #eee; border-radius: 6px; font-size: 0.85rem; min-height: 50px; line-height: 1.6; }
    </style>
</head>
<body>
    <h3>📅 バイト・生活一括登録（うおwwwww）</h3>

    <div class="card">
        <label>対象月</label>
        <input type="month" id="monthPicker">
        <label>バイト設定 (A:開始時間 / B:終了時間)</label>
        <div style="display:flex; gap:10px;">
            <input type="time" id="startA" value="06:00">
            <input type="time" id="endB" value="09:00">
        </div>
        
        <label>バイト日 (1, 3, 5...)</label>
        <input type="text" id="workDays" placeholder="数字をカンマで入力">
        
        <button class="btn btn-add" onclick="confirmDays()" style="margin-top:10px;">1. 日程を確定</button>
    </div>

    <div class="card">
        <label>就寝設定 (A:通常 / B:バイト前夜)</label>
        <div style="display:flex; gap:10px;">
            <input type="time" id="sleepA" value="23:00">
            <input type="time" id="sleepB" value="22:00">
        </div>
        <label>起床設定 (A:通常 / B:バイト当日)</label>
        <div style="display:flex; gap:10px;">
            <input type="time" id="wakeA" value="07:00">
            <input type="time" id="wakeB" value="05:00">
        </div>

        <label>洗濯をする曜日を選択</label>
        <div class="day-selector" id="laundryDays">
            <button class="day-btn" onclick="toggleDay(this, 0)">日</button>
            <button class="day-btn" onclick="toggleDay(this, 1)">月</button>
            <button class="day-btn active" onclick="toggleDay(this, 2)">火</button>
            <button class="day-btn" onclick="toggleDay(this, 3)">水</button>
            <button class="day-btn" onclick="toggleDay(this, 4)">木</button>
            <button class="day-btn active" onclick="toggleDay(this, 5)">金</button>
            <button class="day-btn" onclick="toggleDay(this, 6)">土</button>
        </div>

        <div id="status">日程を確定してください</div>
    </div>

    <button class="btn btn-send" onclick="sendToNotion()">2. Notionへ送信</button>

    <script>
        let selectedWorkDays = [];
        let selectedLaundryDays = [2, 5]; // デフォルト火・金
        let selectedCollectionDays = [3, 6];

        window.onload = () => {
            const now = new Date();
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            document.getElementById('monthPicker').value = nextMonth.toISOString().substring(0, 7);
        };

        // 曜日のトグル
        function toggleDay(btn, dayIndex) {
            btn.classList.toggle('active');
            
            // 1. 洗濯日の配列を更新
            if (selectedLaundryDays.includes(dayIndex)) {
                selectedLaundryDays = selectedLaundryDays.filter(d => d !== dayIndex);
            } else {
                selectedLaundryDays.push(dayIndex);
            }
        
            // 2. 変更に追従して「とりこみ日」を再計算
            // これで常に最新の洗濯日の「翌日」がセットされます
            selectedCollectionDays = selectedLaundryDays.map(day => (day + 1) % 7);
        }

        function confirmDays() {
            const input = document.getElementById('workDays').value;
            if (!input) return alert("日付を入力してください");
            selectedWorkDays = input.split(/[,、\s]+/).map(d => parseInt(d)).filter(d => !isNaN(d)).sort((a,b) => a-b);
            document.getElementById('status').innerHTML = "<b>確定:</b> " + selectedWorkDays.join(", ") + "日<br>前月末(就寝)〜今月末(夕食)の範囲で作成します。";
        }

        async function sendToNotion() {
            if (selectedWorkDays.length === 0) return alert("先に日程を確定してください");
            
            const monthStr = document.getElementById('monthPicker').value;
            const [year, month] = monthStr.split('-').map(Number);
            
            const lastDayOfPrevMonth = new Date(year, month - 1, 0);
            const lastDayOfThisMonth = new Date(year, month, 0);
            const totalDaysInMonth = lastDayOfThisMonth.getDate();

            const sA = document.getElementById('sleepA').value;
            const sB = document.getElementById('sleepB').value;
            const wA = document.getElementById('wakeA').value;
            const wB = document.getElementById('wakeB').value;
            const stA = document.getElementById('startA').value;
            const enB = document.getElementById('endB').value;

            const btn = document.querySelector('.btn-send');
            btn.disabled = true;
            btn.innerText = "送信中...";

            for (let dayOffset = 0; dayOffset <= totalDaysInMonth; dayOffset++) {
                let targetDate = new Date(year, month - 1, dayOffset);
                if(dayOffset === 0) targetDate = lastDayOfPrevMonth;

                const dateStr = formatDate(targetDate);
                const dayNum = targetDate.getDate();
                const isPreMonth = dayOffset === 0;
                const isLastDay = dayOffset === totalDaysInMonth;
                const dayOfWeek = targetDate.getDay();

                // --- 1. 就寝 (生活DB) ---
                if (!isLastDay) {
                    const tomorrow = new Date(targetDate);
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    const isTomorrowWork = (tomorrow.getMonth() + 1 === month) && selectedWorkDays.includes(tomorrow.getDate());
                    const sleepTime = isTomorrowWork ? sB : sA;
                    
                    await postData({
                        db_type: "sleep",
                        title: "就寝",
                        start_date: `${dateStr}T${sleepTime}:00`,
                        end_date: `${dateStr}T${addMinutesToTime(sleepTime, 45)}:00`
                    });
                }

                // --- 2. その他ルーティン (前月末はスキップ) ---
                if (!isPreMonth) {
                    const isTodayWork = selectedWorkDays.includes(dayNum);

                    // 起床
                    const wakeTime = isTodayWork ? wB : wA;
                    await postData({
                        db_type: "sleep", title: "起床",
                        start_date: `${dateStr}T${wakeTime}:00`,
                        end_date: `${dateStr}T${addMinutesToTime(wakeTime, 45)}:00`
                    });

                    // 昼食休憩
                    await postData({
                        db_type: "sleep", title: "昼食休憩",
                        start_date: `${dateStr}T12:00:00`,
                        end_date: `${dateStr}T12:45:00`
                    });

                    // 夕食・風呂 (選択された曜日なら洗濯を追加)
                    let dinnerTitle = selectedLaundryDays.includes(dayOfWeek) 
                        ? "夕食・風呂（洗濯）" 
                        : selectedCollectionDays.includes(dayOfWeek) 
                            ? "夕食・風呂（洗濯とりこみ）" 
                            : "夕食・風呂";
                    await postData({
                        db_type: "sleep", title: dinnerTitle,
                        start_date: `${dateStr}T20:00:00`,
                        end_date: `${dateStr}T20:45:00`
                    });

                    // バイト本体
                    if (isTodayWork) {
                        await postData({
                            db_type: "work", title: "セブンバイト",
                            start_date: `${dateStr}T${stA}:00`,
                            end_date: `${dateStr}T${enB}:00`
                        });
                    }
                }

                document.getElementById('status').innerText = `${dateStr} 処理完了...`;
                await new Promise(r => setTimeout(r, 400));
            }

            alert("登録が完了しました！");
            document.getElementById('status').innerText = "すべて完了しました。";
            btn.disabled = false;
            btn.innerText = "2. Notionへ送信";
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function addMinutesToTime(timeStr, addMinutes) {
            let [hours, minutes] = timeStr.split(':').map(Number);
            minutes += addMinutes;
            hours += Math.floor(minutes / 60);
            minutes = minutes % 60;
            hours = hours % 24;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
        }

        async function postData(payload) {
            try {
                await fetch("https://hook.eu1.make.com/dbm7geabnuzxoutgoz7h3v2cuyzhklct", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
